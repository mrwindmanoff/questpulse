server.port=${PORT:8080}

# HSQLDB Database (файловая, сохраняется между запусками)
spring.datasource.url=jdbc:hsqldb:file:~/task-solver-db;shutdown=true
spring.datasource.driverClassName=org.hsqldb.jdbc.JDBCDriver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.HSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Почта (Yandex) – настройки через переменные окружения
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
# Для порта 25 обычно не требуется STARTTLS, но оставим false
spring.mail.properties.mail.smtp.starttls.enable=false
# Для порта 25 SSL не нужен
spring.mail.properties.mail.smtp.ssl.enable=false

# Таймауты (чтобы не зависало при проблемах с сетью)
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Базовый URL для ссылок в письмах (используется в AuthController)
app.base-url=${APP_BASE_URL}

# Для отладки (можно убрать после исправления)
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail=DEBUG

# Администратор – значения берутся из переменных окружения
ADMIN_USERNAME=${ADMIN_USERNAME}
ADMIN_PASSWORD=${ADMIN_PASSWORD}
ADMIN_EMAIL=${ADMIN_EMAIL}