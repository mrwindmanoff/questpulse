<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Восстановление пароля</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h1>Восстановление пароля</h1>

    <div th:if="${error}" class="alert error" th:text="${error}"></div>
    <div th:if="${success}" class="alert success" th:text="${success}"></div>

    <!-- Если есть ссылка для сброса, показываем её -->
    <div th:if="${resetLink}" style="margin: 2rem 0; padding: 1rem; background: #1a1f2f; border: 2px solid #0ff; text-align: center;">
        <p style="word-break: break-all; color: #0ff;">
            <a th:href="${resetLink}" style="color: #f0f; text-decoration: underline;" target="_blank">[[${resetLink}]]</a>
        </p>
        <p style="color: #c0f0f0; margin-top: 1rem;">Ссылка действительна 1 час. Нажмите на неё, чтобы перейти к смене пароля.</p>
    </div>

    <!-- Форма ввода email (показываем только если нет resetLink) -->
    <form th:unless="${resetLink}" method="post" th:action="@{/forgot-password}">
        <div>
            <label>Введите ваш email:</label>
            <input type="email" name="email" required>
        </div>
        <button type="submit">Отправить инструкцию</button>
    </form>

    <p><a href="/login">← Вернуться ко входу</a></p>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
