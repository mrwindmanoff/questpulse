<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div th:fragment="navbar">
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: #0a0f0f; border-bottom: 2px solid #0ff; box-shadow: 0 0 20px #0ff;">
        <div style="display: flex; gap: 2rem;">
            <a href="/" style="color: #f0f; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;">Главная</a>
            <a href="/leaders" style="color: #f0f; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;">Таблица лидеров</a>
        </div>
        <div style="display: flex; align-items: center; gap: 2rem;">
            <div sec:authorize="isAuthenticated()">
                Привет, <a th:href="@{'/user/' + ${#authentication.name}}" style="color: #f0f; text-decoration: underline;">[[${#authentication.name}]]</a>
                (Звание: <span th:text="${currentUser != null ? currentUser.rank : 'Новичок'}">Новичок</span>)
                | <a href="/profile" style="color: #f0f;">Профиль</a>
                | <a th:href="@{/logout}" style="color: #f0f;">Выйти</a>
            </div>
            <div sec:authorize="!isAuthenticated()">
                <a href="/login" style="color: #f0f;">[Вход]</a> |
                <a href="/register" style="color: #f0f;">[Регистрация]</a>
            </div>
            <!-- Логотип в правом верхнем углу -->
            <div style="font-size: 1.5rem; font-weight: bold; color: #0ff; text-shadow: 0 0 10px #0ff;">
                QP
            </div>
        </div>
    </nav>
</div>
</body>
</html>
