<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Решить задачу</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/doors.js"></script>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h1 th:text="${task.title}">Задача</h1>
    <p><strong>Автор:</strong> <a th:href="@{'/user/' + ${task.author.username}}" th:text="${task.author.username}">Автор</a></p>
    <p><strong>Сложность:</strong> <span th:text="${task.difficulty}">EASY</span></p>
    <p><strong>Награда:</strong> <span th:text="${task.rewardXp}">10</span> XP</p>
    <p><strong>Похвал:</strong> <span th:text="${task.praiseCount}" style="color: #ffaa00;">0</span></p>

    <div class="task-description">
        <h3>Условие:</h3>
        <p th:text="${task.description}">Описание</p>
    </div>

    <div th:if="${message}" class="alert success" th:text="${message}"></div>
    <div th:if="${error}" class="alert error" th:text="${error}"></div>

    <form method="post" th:action="@{|/tasks/${task.id}/solve|}">
        <div>
            <label>Ваш ответ:</label>
            <input type="text" name="answer" required>
        </div>
        <button type="submit">Отправить</button>
    </form>

    <div sec:authorize="isAuthenticated()" th:if="${#authentication.name != task.author.username}">
        <form method="post" th:action="@{|/tasks/${task.id}/praise|}" style="margin-top: 1rem; display: inline-block;">
            <button type="submit" class="btn" style="border-color: #ffaa00; color: #ffaa00;">👍 Похвалить задачу</button>
        </form>
    </div>

    <div sec:authorize="isAuthenticated()" th:if="${#authentication.name != task.author.username}">
        <form method="post" th:action="@{|/tasks/${task.id}/report|}" style="margin-top: 1rem; display: inline-block;">
            <button type="submit" class="btn btn-danger">⚠️ Пожаловаться</button>
        </form>
    </div>

    <p><a href="/">← К списку задач</a></p>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
