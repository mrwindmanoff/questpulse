<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>QuestPulse</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h1>Задачи</h1>

    <div sec:authorize="isAuthenticated()">
        <a href="/tasks/create" class="btn btn-primary">+ Создать задачу</a>
    </div>

    <div th:if="${message}" class="alert success" th:text="${message}"></div>
    <div th:if="${error}" class="alert error" th:text="${error}"></div>

    <div class="task-grid">
        <div class="task-card" th:each="task : ${tasks}">
            <h3 th:text="${task.title}">Название</h3>
            <p><strong>Автор:</strong> <a th:href="@{'/user/' + ${task.author.username}}" th:text="${task.author.username}" style="color: #f0f; text-decoration: underline;">Автор</a></p>
            <p><strong>Сложность:</strong>
                <span class="difficulty" th:text="${task.difficulty}"
                      th:classappend="|difficulty-${task.difficulty}|">EASY</span>
            </p>
            <p><strong>Награда:</strong> <span th:text="${task.rewardXp}">10</span> XP</p>
            <p><strong>Похвал:</strong> <span style="color: #ffaa00;" th:text="${task.praiseCount}">0</span></p>
            <p th:if="${task.reportCount > 0}"><strong>Жалоб:</strong> <span style="color: #ff4444;" th:text="${task.reportCount}">0</span></p>
            <div class="task-actions">
                <a th:href="@{|/tasks/${task.id}/solve|}" class="btn">Решить</a>
                <a th:if="${currentUser != null and (task.author.id == currentUser.id or currentUser.admin)}"
                   th:href="@{|/tasks/${task.id}/delete|}"
                   class="btn btn-danger"
                   onclick="return confirm('Удалить задачу?')">Удалить</a>
            </div>
        </div>
    </div>
    
    <!-- Лента активности -->
    <div th:replace="~{fragments/activities :: activitiesList}"></div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
