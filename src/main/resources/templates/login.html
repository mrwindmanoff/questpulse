<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Вход</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h1>Вход</h1>

    <!-- Сообщение об ошибке входа -->
    <div th:if="${param.error}" class="alert error">
        Неверное имя пользователя или пароль.
    </div>
    
    <!-- Сообщение о бане -->
    <div th:if="${param.banned}" class="alert error">
        ⚠️ Ваш аккаунт забанен. Доступ запрещён.
    </div>
    
    <!-- Сообщение об успешной регистрации -->
    <div th:if="${param.registered}" class="alert success">
        Регистрация прошла успешно! Войдите.
    </div>
    
    <!-- Сообщение об успешной смене пароля -->
    <div th:if="${param.resetSuccess}" class="alert success">
        Пароль успешно изменён! Войдите с новым паролем.
    </div>
    
    <!-- Сообщение о подтверждении email -->
    <div th:if="${param.verified}" class="alert success">
        Email успешно подтверждён! Теперь вы можете войти.
    </div>

    <!-- Форма входа -->
    <form method="post" th:action="@{/login}">
        <div>
            <label>Имя пользователя:</label>
            <input type="text" name="username" required>
        </div>
        <div>
            <label>Пароль:</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">Войти</button>
    </form>

    <!-- Ссылки -->
    <p style="margin-top: 1rem;">
        <a href="/forgot-password">Забыли пароль?</a>
    </p>

    <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
