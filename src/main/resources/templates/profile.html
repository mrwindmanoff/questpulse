<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Профиль</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h1>Личный кабинет</h1>

    <div class="profile-card">
        <p><strong>Никнейм:</strong> <span th:text="${user.username}">username</span></p>
        <p><strong>Email:</strong> <span th:text="${user.email}">email</span></p>
        <p><strong>Опыт (XP):</strong> <span th:text="${user.totalXp}">0</span></p>
        <p><strong>Звание:</strong> <span th:text="${user.rank}">Новичок</span></p>
        <p th:if="${user.admin}"><strong>Статус:</strong> <span style="color: #f0f;">Администратор</span></p>
        <p th:if="${user.banned}"><strong>Статус:</strong> <span style="color: #ff4444;">ЗАБАНЕН</span></p>
        <p th:if="${user.banned and user.banReason != null}"><strong>Причина бана:</strong> <span th:text="${user.banReason}"></span></p>
    </div>

    <div th:if="${user.admin}" style="margin-top: 2rem; text-align: center;">
        <a href="/admin/users" class="btn btn-danger" style="padding: 1rem 2rem; font-size: 1.2rem; border-width: 3px;">
            ⚡ Управление пользователями (админка)
        </a>
    </div>

    <p style="margin-top: 2rem;"><a href="/">← На главную</a></p>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
