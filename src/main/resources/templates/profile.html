<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Профиль</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h1>Личный кабинет</h1>

    <div class="profile-card">
        <p><strong>Никнейм:</strong> <span th:text="${user.username}">username</span></p>
        <p><strong>Email:</strong> <span th:text="${user.email}">email</span></p>
        <p><strong>Опыт (XP):</strong> <span th:text="${user.totalXp}">0</span></p>
        <p><strong>Звание:</strong> <span th:text="${user.rank}">Новичок</span></p>
        <p th:if="${user.admin}"><strong>Статус:</strong> <span style="color: #f0f;">Администратор</span></p>
        <p th:if="${user.banned}"><strong>Статус:</strong> <span style="color: #ff4444;">ЗАБАНЕН</span></p>
        <p th:if="${user.banned and user.banReason != null}"><strong>Причина бана:</strong> <span th:text="${user.banReason}"></span></p>
    </div>

    <!-- Достижения -->
    <div th:if="${userAchievements != null and !userAchievements.isEmpty()}" style="margin-top: 2rem;">
        <h2 style="color: #f0f;">🏆 Достижения</h2>
        <div style="display: flex; flex-wrap: wrap; gap: 1rem;">
            <div th:each="ach : ${userAchievements}" 
                 style="background: #1a1f2f; border: 2px solid #ffaa00; padding: 1rem; border-radius: 10px; width: 200px;">
                <div style="font-size: 2rem; text-align: center; color: #ffaa00;">
                    <span th:if="${ach.type == 'FIRST_TASK'}">➕</span>
                    <span th:if="${ach.type == 'TEN_TASKS'}">📚</span>
                    <span th:if="${ach.type == 'FIRST_SOLVE'}">✅</span>
                    <span th:if="${ach.type == 'TEN_SOLVES'}">🏅</span>
                </div>
                <h3 style="color: #ffaa00; margin: 0.5rem 0;" th:text="${ach.name}">Название</h3>
                <p style="color: #c0f0f0; font-size: 0.9rem;" th:text="${ach.description}">Описание</p>
                <p style="color: #0ff; font-size: 0.8rem;" th:text="${ach.earnedAt}">дата</p>
            </div>
        </div>
    </div>

    <div th:if="${user.admin}" style="margin-top: 2rem; text-align: center;">
        <a href="/admin/users" class="btn btn-danger" style="padding: 1rem 2rem; font-size: 1.2rem; border-width: 3px;">
            ⚡ Управление пользователями (админка)
        </a>
    </div>

    <p style="margin-top: 2rem;"><a href="/">← На главную</a></p>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
